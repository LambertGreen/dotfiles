# Pre-commit hooks for dotfiles repository
# Install with: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Whitespace and formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # File integrity
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: '(vscode|cursor|ai_cursor).*\.(json|jsonc)$'  # Exclude VSCode/Cursor JSONC files
      - id: check-toml

      # Security
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=1000]

      # Shell scripts
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: '^\.envrc$|dot-zprofile|dot-zshrc|dot-zshenv|dot-bashrc|dot-bash_profile'

  # Shell script linting (local: uses system shellcheck, no Docker required)
  # Requires shellcheck on PATH (brew install shellcheck / apt install shellcheck)
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude_types: [zsh]
        args: [-e, SC1091, -e, SC2034]  # Ignore source/unused vars common in dotfiles
        exclude: '^\.envrc$|dot-zsh|dot-zprofile'

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3009]  # Ignore apt/apk version pinning for dotfiles

  # Custom local hooks
  - repo: local
    hooks:
      - id: detect-sensitive-tokens
        name: Detect sensitive tokens
        entry: .githooks/pre-commit
        language: script
        always_run: true
